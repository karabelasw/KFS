spring.application.name=kfs
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/KFS
spring.datasource.username={username}
spring.datasource.password={password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Logging (Logback, Spring Boot's default)  base config.
# Profile-specific overrides live in application-{profile}.properties
# ===================================================================

# --- File output ---
logging.file.name=logs/kfs.log

# --- Rolling policy (size + time based) ---
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB
logging.logback.rollingpolicy.file-name-pattern=logs/kfs.%d{yyyy-MM-dd}.%i.log

# --- Severity levels ---
logging.level.root=INFO
logging.level.com.karabelas.kfs=DEBUG

# NOTE: spring.jpa.show-sql=true above prints SQL via System.out,
# NOT through Logback  it will not appear in logs/kfs.log.
# This property is the Logback-routed equivalent, which DOES land
# in the file. Consider using this instead of (or alongside) show-sql.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO